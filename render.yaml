# Render blueprint: one web service — Express serves both the API and the
# built Vite frontend. Set the Supabase env vars in the Render dashboard
# (sync: false below keeps secrets out of the repo). Note: SQLite on Render's
# free disk is ephemeral — attach a Render Postgres and set DATABASE_URL for
# persistent data. FRONTEND_ORIGIN defaults to RENDER_EXTERNAL_URL in code,
# so no cross-service wiring is needed.
services:
  - type: web
    name: stammtisch
    runtime: node
    # backend `npm run build` also builds the frontend (build:frontend), so a
    # service configured with only the backend build still serves the app.
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm run seed && npm run start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      # - key: DATABASE_URL          # uncomment once a Render Postgres exists
      #   fromDatabase:
      #     name: stammtisch-db
      #     property: connectionString
